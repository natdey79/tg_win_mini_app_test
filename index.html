<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Reminder</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>⏰ Task Reminder</h1>
            <p id="user-greeting">Hello!</p>
        </header>

        <div class="card">
            <h2>Add New Reminder</h2>
            <div class="form-group">
                <input type="text" id="task-title" placeholder="What do you need to remember?" maxlength="100">
                
                <!-- DATE PICKER -->
                <label for="task-date">Select Date:</label>
                <input type="date" id="task-date">
                
                <!-- TIME PICKER -->
                <label for="task-time">Select Time:</label>
                <input type="time" id="task-time">
                
                <button id="add-task-btn" class="btn-primary">Add Reminder</button>
            </div>
        </div>

        <div class="card">
            <h2>Your Reminders</h2>
            <div id="task-list">
                <p class="empty-message">No reminders yet. Add one above!</p>
            </div>
        </div>

        <div class="action-buttons">
            <button id="clear-all-btn" class="btn-secondary">Clear All</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
